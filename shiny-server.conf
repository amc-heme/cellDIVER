# shiny-server configuration for the cellDIVER image.
#
# Serves /srv/shiny-server on port 3838 with a directory index, so every
# per-dataset subdirectory that contains an app.R is browsable at
# localhost:3838/<subdir> (and its config editor at /<subdir>/config).

# Run apps as the unprivileged `shiny` user shipped in the base image.
run_as shiny;

# Generous keepalive so long-running plot/DGE computations are not cut off.
http_keepalive_timeout 600;

server {
  listen 3838;

  location / {
    # Serve every app discovered under this directory tree. Note: shiny-server
    # will NOT serve an app nested inside another app's directory, so each
    # dataset uses sibling browser/ and config/ sub-apps rather than making the
    # dataset folder itself an app.
    site_dir /srv/shiny-server;
    log_dir /var/log/shiny-server;

    # Show an index of the served apps at the site root.
    directory_index on;

    # Keep idle sessions alive long enough for exploratory analysis.
    app_idle_timeout 600;
  }
}
